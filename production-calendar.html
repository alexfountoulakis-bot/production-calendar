<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>MOR Production Calendar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f4f0;
    color: #2C2C2A;
    display: flex;
    flex-direction: column;
    padding: 12px 16px 12px;
  }

  .page-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: #2C2C2A;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .page-title svg { width: 22px; height: 22px; color: #534AB7; }

  .sync-status {
    font-size: 12px;
    color: #888780;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; display: inline-block; }
  .sync-dot.syncing { background: #BA7517; animation: pulse 1s infinite; }
  .sync-dot.error { background: #A32D2D; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .cal-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e0ded6;
    padding: 14px 16px 10px;
    overflow: hidden;
  }

  .cal-nav-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .cal-nav-row h2 { font-size: 15px; font-weight: 600; color: #2C2C2A; }

  .nav-btns { display: flex; gap: 8px; }

  .nav-btn {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    padding: 5px 13px;
    font-size: 13px;
    cursor: pointer;
    color: #2C2C2A;
    font-family: inherit;
    transition: background .15s, border-color .15s;
  }
  .nav-btn:hover { background: #f5f4f0; border-color: #b4b2a9; }
  .nav-btn.today-btn { color: #534AB7; border-color: #534AB7; }
  .nav-btn.today-btn:hover { background: #EEEDFE; }

  .weekdays-row {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .weekday-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #888780;
    padding: 5px 0;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .cal-grids {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  .month-block { display: flex; flex-direction: column; min-height: 0; }
  .month-block.full { flex: 2; }
  .month-block.half { flex: 1; }

  .month-heading {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 6px 2px 4px;
  }

  .days-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    min-height: 0;
  }

  .day-cell {
    background: #fff;
    border: 1px solid #e8e6de;
    border-radius: 8px;
    padding: 7px 8px 6px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .day-cell:hover { border-color: #b4b2a9; background: #fafaf8; }
  .day-cell.other-month { opacity: .28; pointer-events: none; }
  .day-cell.today { border-color: #534AB7; background: #EEEDFE; }
  .day-cell.has-notes { border-color: #534AB7; }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    color: #2C2C2A;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  .day-cell.today .day-num { background: #534AB7; color: #fff; }

  .cell-notes {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
    overflow: hidden;
  }

  .cell-note-line {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    color: #1a1a18;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-radius: 4px;
    padding: 2px 6px;
  }

  .cell-more {
    font-size: 11px;
    color: #888780;
    margin-top: 2px;
    padding-left: 4px;
  }

  .legend {
    flex-shrink: 0;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #e8e6de;
    font-size: 11px;
    color: #888780;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; background: #534AB7; }
  .legend-today-pill {
    width: 16px; height: 16px; border-radius: 50%;
    background: #534AB7; color: #fff;
    font-size: 9px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .legend-highlight {
    font-size: 11px;
    font-weight: 500;
    color: #1a1a18;
    padding: 1px 6px;
    border-radius: 3px;
  }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }

  .modal {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e0ded6;
    padding: 20px;
    width: 480px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .modal-date-label { font-size: 15px; font-weight: 600; color: #2C2C2A; }

  .modal-close {
    background: none; border: none;
    cursor: pointer; font-size: 22px;
    color: #888780; line-height: 1;
    padding: 2px 4px; border-radius: 6px;
  }
  .modal-close:hover { background: #f5f4f0; color: #2C2C2A; }

  .notes-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

  .note-item {
    border-radius: 8px;
    padding: 9px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .note-item-text {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: #1a1a18;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .note-item-footer {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .note-item-actions { margin-left: auto; display: flex; gap: 6px; }

  .btn-icon {
    background: rgba(0,0,0,.08);
    border: none;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    color: #1a1a18;
    transition: background .12s;
  }
  .btn-icon:hover { background: rgba(0,0,0,.18); }
  .btn-icon.del { color: #7a1f1f; }
  .btn-icon.del:hover { background: rgba(163,45,45,.25); }

  .note-form {
    border: 1px solid #d3d1c7;
    border-radius: 10px;
    padding: 12px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .note-form-title {
    font-size: 12px;
    font-weight: 600;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* Highlight color picker */
  .highlight-bar {
    background: #f5f4f0;
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .highlight-bar-label { font-size: 11px; color: #888780; font-weight: 500; white-space: nowrap; }

  .highlight-swatch {
    height: 24px;
    padding: 0 10px;
    border-radius: 5px;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: transform .12s, border-color .12s;
    font-size: 11px;
    font-weight: 600;
    color: #1a1a18;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }
  .highlight-swatch:hover { transform: scale(1.08); }
  .highlight-swatch.active { border-color: #2C2C2A; transform: scale(1.08); }

  .note-form textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 13px;
    font-family: inherit;
    background: #fafaf8;
    resize: vertical;
    line-height: 1.6;
    color: #1a1a18;
    transition: border-color .15s, background .15s;
  }
  .note-form textarea:focus { outline: none; border-color: #534AB7; }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
  }

  .save-msg { font-size: 11px; color: #888780; flex: 1; }

  .btn {
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
  }
  .btn-secondary { background: #fff; border: 1px solid #d3d1c7; color: #5F5E5A; }
  .btn-secondary:hover { background: #f5f4f0; }
  .btn-primary { background: #534AB7; border: 1px solid #534AB7; color: #fff; }
  .btn-primary:hover { background: #3C3489; border-color: #3C3489; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    MOR Production Calendar
  </div>
  <div class="sync-status">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncLabel">Connecting…</span>
  </div>
</div>

<div class="cal-container">
  <div class="cal-nav-row">
    <h2 id="calRangeLabel"></h2>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn">&#8592; Prev</button>
      <button class="nav-btn today-btn" id="todayBtn">Today</button>
      <button class="nav-btn" id="nextBtn">Next &#8594;</button>
    </div>
  </div>
  <div class="weekdays-row" id="weekdaysRow"></div>
  <div class="cal-grids" id="calGrids"></div>
  <div class="legend" id="legend"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcdlawvuK4CY7_yiPWndZH7v66zDwiKbo",
    authDomain: "mor-production-calendar.firebaseapp.com",
    projectId: "mor-production-calendar",
    storageBucket: "mor-production-calendar.firebasestorage.app",
    messagingSenderId: "282273831653",
    appId: "1:282273831653:web:682e31be16c53820add20c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const HIGHLIGHTS = [
    { hex: '#ffffff', label: 'None' },
    { hex: '#FFF176', label: 'Yellow' },
    { hex: '#A5D6A7', label: 'Green' },
    { hex: '#90CAF9', label: 'Blue' },
    { hex: '#F48FB1', label: 'Pink' },
    { hex: '#FFCC80', label: 'Orange' },
    { hex: '#CE93D8', label: 'Purple' },
    { hex: '#80DEEA', label: 'Teal' },
    { hex: '#EF9A9A', label: 'Red' },
    { hex: '#E6EE9C', label: 'Lime' },
  ];

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const WEEKDAYS = ['Mon','Tue','Wed','Thu','Fri'];
  const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const notes = {};
  const today = new Date(); today.setHours(0,0,0,0);
  let viewStart = new Date(today.getFullYear(), today.getMonth(), 1);
  let modalEl = null;

  const syncDot = document.getElementById('syncDot');
  const syncLabel = document.getElementById('syncLabel');

  function setSyncStatus(state) {
    syncDot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    syncLabel.textContent = state === 'syncing' ? 'Syncing…' : state === 'error' ? 'Connection error' : 'Live — all changes saved';
  }

  onSnapshot(collection(db, 'notes'), (snapshot) => {
    snapshot.docChanges().forEach(change => {
      if (change.type === 'removed') delete notes[change.doc.id];
      else notes[change.doc.id] = change.doc.data().entries || [];
    });
    setSyncStatus('live');
    buildCalendar();
  }, () => setSyncStatus('error'));

  function keyFor(d) {
    return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
  }

  function isWeekend(d) {
    return d.getDay() === 0 || d.getDay() === 6;
  }

  async function persistDay(key) {
    setSyncStatus('syncing');
    const entries = notes[key] || [];
    if (entries.length === 0) {
      await deleteDoc(doc(db, 'notes', key));
      delete notes[key];
    } else {
      await setDoc(doc(db, 'notes', key), { entries });
    }
  }

  function uid() {
    return Math.random().toString(36).slice(2, 10);
  }

  function buildLegend() {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';

    const items = [
      `<div class="legend-item"><div class="legend-dot"></div> Has notes</div>`,
      `<div class="legend-item"><div class="legend-today-pill">9</div> Today</div>`,
      `<div class="legend-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#888780" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Click any date to add notes</div>`,
    ];
    items.forEach(h => { const d = document.createElement('div'); d.innerHTML = h; legend.appendChild(d.firstChild); });

    // Show highlight color samples
    const sep = document.createElement('div');
    sep.style.cssText = 'width:1px;height:14px;background:#e8e6de;margin:0 4px';
    legend.appendChild(sep);

    HIGHLIGHTS.filter(h => h.hex !== '#ffffff').forEach(h => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      const swatch = document.createElement('span');
      swatch.className = 'legend-highlight';
      swatch.style.background = h.hex;
      swatch.textContent = h.label;
      item.appendChild(swatch);
      legend.appendChild(item);
    });
  }

  function buildCalendar() {
    const grids = document.getElementById('calGrids');
    const rangeLabel = document.getElementById('calRangeLabel');
    grids.innerHTML = '';

    const weekRow = document.getElementById('weekdaysRow');
    if (!weekRow.children.length) {
      WEEKDAYS.forEach(d => {
        const el = document.createElement('div');
        el.className = 'weekday-label';
        el.textContent = d;
        weekRow.appendChild(el);
      });
    }

    buildLegend();

    const m2 = new Date(viewStart.getFullYear(), viewStart.getMonth() + 1, 1);
    rangeLabel.textContent = MONTHS[viewStart.getMonth()] + ' ' + viewStart.getFullYear() + ' – mid ' + MONTHS[m2.getMonth()] + ' ' + m2.getFullYear();

    grids.appendChild(makeMonthBlock(viewStart, false));
    grids.appendChild(makeMonthBlock(m2, true));
  }

  function makeMonthBlock(monthDate, halfOnly) {
    const block = document.createElement('div');
    block.className = 'month-block ' + (halfOnly ? 'half' : 'full');

    const heading = document.createElement('div');
    heading.className = 'month-heading';
    heading.textContent = MONTHS[monthDate.getMonth()] + ' ' + monthDate.getFullYear() + (halfOnly ? ' (first half)' : '');
    block.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'days-grid';

    const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
    const lastDate = halfOnly ? 15 : new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0).getDate();

    const firstDayOfWeek = first.getDay();
    const daysBackToMonday = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;

    for (let i = daysBackToMonday; i > 0; i--) {
      const d = new Date(first); d.setDate(d.getDate() - i);
      if (!isWeekend(d)) grid.appendChild(makeCell(d, true));
    }

    for (let i = 1; i <= lastDate; i++) {
      const d = new Date(monthDate.getFullYear(), monthDate.getMonth(), i);
      if (!isWeekend(d)) grid.appendChild(makeCell(d, false));
    }

    if (!halfOnly) {
      const last = new Date(monthDate.getFullYear(), monthDate.getMonth(), lastDate);
      const lastDayOfWeek = last.getDay();
      let daysToFriday = 0;
      if (lastDayOfWeek >= 1 && lastDayOfWeek <= 4) daysToFriday = 5 - lastDayOfWeek;
      for (let i = 1; i <= daysToFriday; i++) {
        const d = new Date(last); d.setDate(d.getDate() + i);
        if (!isWeekend(d)) grid.appendChild(makeCell(d, true));
      }
    }

    block.appendChild(grid);
    return block;
  }

  function makeCell(d, otherMonth) {
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (otherMonth ? ' other-month' : '');
    const k = keyFor(d);
    if (d.getTime() === today.getTime()) cell.classList.add('today');
    const entries = notes[k] || [];
    if (entries.length > 0) cell.classList.add('has-notes');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d.getDate();
    cell.appendChild(numEl);

    if (entries.length > 0) {
      const notesEl = document.createElement('div');
      notesEl.className = 'cell-notes';
      entries.slice(0, 6).forEach(e => {
        const line = document.createElement('div');
        line.className = 'cell-note-line';
        line.style.background = e.highlight || '#ffffff';
        line.textContent = e.text;
        notesEl.appendChild(line);
      });
      if (entries.length > 6) {
        const more = document.createElement('div');
        more.className = 'cell-more';
        more.textContent = '+' + (entries.length - 6) + ' more';
        notesEl.appendChild(more);
      }
      cell.appendChild(notesEl);
    }

    cell.onclick = () => openModal(d);
    return cell;
  }

  function openModal(d) {
    closeModal();
    const k = keyFor(d);
    if (!notes[k]) notes[k] = [];

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    const m = document.createElement('div');
    m.className = 'modal';
    backdrop.appendChild(m);
    document.body.appendChild(backdrop);
    modalEl = backdrop;

    backdrop.onclick = (e) => { if (e.target === backdrop) closeModal(); };
    renderModal(m, d, k, null);
  }

  function renderModal(m, d, k, editingId) {
    const fullDateStr = FULL_DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    const entries = notes[k] || [];
    let formHighlight = HIGHLIGHTS[0].hex;
    let formText = '';

    if (editingId) {
      const existing = entries.find(e => e.id === editingId);
      if (existing) { formHighlight = existing.highlight || '#ffffff'; formText = existing.text; }
    }

    m.innerHTML = '';

    const hdr = document.createElement('div');
    hdr.className = 'modal-header';
    hdr.innerHTML = `<div class="modal-date-label">${fullDateStr}</div><button class="modal-close" id="mClose" aria-label="Close">&times;</button>`;
    m.appendChild(hdr);
    document.getElementById('mClose').onclick = closeModal;

    if (entries.length > 0) {
      const list = document.createElement('div');
      list.className = 'notes-list';
      entries.forEach(e => {
        const item = document.createElement('div');
        item.className = 'note-item';
        item.style.background = e.highlight || '#f5f4f0';

        const txt = document.createElement('div');
        txt.className = 'note-item-text';
        txt.textContent = e.text;
        item.appendChild(txt);

        const footer = document.createElement('div');
        footer.className = 'note-item-footer';

        const actions = document.createElement('div');
        actions.className = 'note-item-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'btn-icon';
        editBtn.textContent = 'Edit';
        editBtn.onclick = () => renderModal(m, d, k, e.id);

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-icon del';
        delBtn.textContent = 'Delete';
        delBtn.onclick = async () => {
          notes[k] = (notes[k] || []).filter(n => n.id !== e.id);
          await persistDay(k);
          renderModal(m, d, k, null);
          buildCalendar();
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        footer.appendChild(actions);
        item.appendChild(footer);
        list.appendChild(item);
      });
      m.appendChild(list);
    }

    const form = document.createElement('div');
    form.className = 'note-form';

    const formTitle = document.createElement('div');
    formTitle.className = 'note-form-title';
    formTitle.textContent = editingId ? 'Edit note' : (entries.length > 0 ? 'Add another note' : 'Add note');
    form.appendChild(formTitle);

    // Highlight picker
    const highlightBar = document.createElement('div');
    highlightBar.className = 'highlight-bar';
    const hlLabel = document.createElement('span');
    hlLabel.className = 'highlight-bar-label';
    hlLabel.textContent = 'Highlight:';
    highlightBar.appendChild(hlLabel);

    HIGHLIGHTS.forEach(h => {
      const sw = document.createElement('div');
      sw.className = 'highlight-swatch' + (h.hex === formHighlight ? ' active' : '');
      sw.style.background = h.hex;
      sw.style.border = h.hex === '#ffffff' ? '2px solid #d3d1c7' : '2.5px solid transparent';
      sw.textContent = h.label;
      if (h.hex === formHighlight && h.hex !== '#ffffff') sw.style.borderColor = '#2C2C2A';
      sw.onclick = () => {
        formHighlight = h.hex;
        highlightBar.querySelectorAll('.highlight-swatch').forEach(s => {
          s.classList.remove('active');
          s.style.borderColor = s.style.background === '#ffffff' ? '#d3d1c7' : 'transparent';
        });
        sw.classList.add('active');
        sw.style.borderColor = h.hex === '#ffffff' ? '#888780' : '#2C2C2A';
        textarea.style.background = formHighlight;
      };
      highlightBar.appendChild(sw);
    });
    form.appendChild(highlightBar);

    const textarea = document.createElement('textarea');
    textarea.placeholder = 'Type your note here…';
    textarea.style.background = formHighlight;
    textarea.value = formText;
    form.appendChild(textarea);

    const actions = document.createElement('div');
    actions.className = 'form-actions';

    const saveMsg = document.createElement('span');
    saveMsg.className = 'save-msg';
    actions.appendChild(saveMsg);

    if (editingId) {
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn btn-secondary';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => renderModal(m, d, k, null);
      actions.appendChild(cancelBtn);
    }

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.textContent = editingId ? 'Update note' : 'Save note';
    saveBtn.onclick = async () => {
      const val = textarea.value.trim();
      if (!val) { saveMsg.textContent = 'Please enter a note.'; return; }
      saveMsg.textContent = 'Saving…';
      if (editingId) {
        const idx = (notes[k] || []).findIndex(e => e.id === editingId);
        if (idx > -1) notes[k][idx] = { id: editingId, text: val, highlight: formHighlight };
      } else {
        if (!notes[k]) notes[k] = [];
        notes[k].push({ id: uid(), text: val, highlight: formHighlight });
      }
      await persistDay(k);
      buildCalendar();
      renderModal(m, d, k, null);
    };
    actions.appendChild(saveBtn);
    form.appendChild(actions);
    m.appendChild(form);

    setTimeout(() => textarea.focus(), 40);
  }

  function closeModal() {
    if (modalEl) { modalEl.remove(); modalEl = null; }
  }

  document.getElementById('prevBtn').onclick = () => {
    viewStart = new Date(viewStart.getFullYear(), viewStart.getMonth() - 1, 1);
    buildCalendar();
  };
  document.getElementById('nextBtn').onclick = () => {
    viewStart = new Date(viewStart.getFullYear(), viewStart.getMonth() + 1, 1);
    buildCalendar();
  };
  document.getElementById('todayBtn').onclick = () => {
    viewStart = new Date(today.getFullYear(), today.getMonth(), 1);
    buildCalendar();
  };

  buildCalendar();
</script>
</body>
</html>
